<div class="container">

```
<h1>🧍 AI Posture Corrector</h1>

<p class="subtitle">
    실시간 거북목 감지 및 음성 교정 시스템
</p>

<div class="status-card">
    <h2 id="status">
        현재 자세 : 정상 ✅
    </h2>
</div>

<video
    id="video"
    autoplay
    playsinline
    muted>
</video>

<canvas id="canvas"></canvas>

<div class="info-container">

    <div class="card">

        <h3>⏰ 경고 시간</h3>

        <select id="alertTime">
            <option value="5">5초</option>
            <option value="30">30초</option>
            <option value="60">1분</option>
        </select>

    </div>

    <div class="card">

        <h3>📊 오늘 경고 횟수</h3>

        <p id="warningCount">0</p>

    </div>

</div>

<footer>
    <p>
        Developed by 김지원 · 2026
    </p>
</footer>
